<!DOCTYPE html>
<html lang="ne">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Register | नेपाल समाचार</title>
  <link rel="stylesheet" href="style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Devanagari:wght@400;500;700&family=Noto+Serif+Devanagari:wght@400;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    .auth-page { min-height: 80vh; display: flex; align-items: center; justify-content: center; padding: 40px 16px; }
    .auth-card { background: white; border-radius: 12px; box-shadow: 0 8px 32px rgba(0,0,0,0.1); padding: 40px; width: 100%; max-width: 420px; }
    .auth-logo { text-align: center; margin-bottom: 24px; }
    .auth-logo .logo-ne { font-family: 'Noto Serif Devanagari', serif; font-size: 28px; font-weight: 700; color: #c0392b; }
    .auth-title { font-size: 20px; font-weight: 700; color: #1a2744; text-align: center; margin-bottom: 24px; }
    .form-group { margin-bottom: 16px; }
    .form-group label { display: block; font-size: 14px; color: #495057; margin-bottom: 6px; font-weight: 500; }
    .form-group input, .form-group select { width: 100%; padding: 10px 14px; border: 1px solid #dee2e6; border-radius: 6px; font-family: var(--font-ne); font-size: 15px; transition: border-color 0.2s; }
    .form-group input:focus { outline: none; border-color: #c0392b; }
    .btn-auth { width: 100%; background: #c0392b; color: white; border: none; padding: 12px; border-radius: 6px; font-size: 16px; font-weight: 700; cursor: pointer; font-family: var(--font-ne); margin-top: 8px; transition: background 0.2s; }
    .btn-auth:hover { background: #922b21; }
    .auth-switch { text-align: center; font-size: 14px; color: #555; margin-top: 16px; }
    .auth-switch a { color: #c0392b; font-weight: 600; }
    .error-msg { background: #fdf2f2; border: 1px solid #f5c6c6; border-radius: 6px; padding: 10px 14px; font-size: 13px; color: #c0392b; margin-bottom: 16px; display: none; }
    .success-msg { background: #f0faf0; border: 1px solid #b8dfb8; border-radius: 6px; padding: 10px 14px; font-size: 13px; color: #2e7d32; margin-bottom: 16px; display: none; }
    .terms { font-size: 12px; color: #6c757d; text-align: center; margin-top: 12px; font-family: var(--font-en); }
    .terms a { color: #c0392b; }
  </style>
</head>
<body>
  <div class="topbar"><div class="container topbar-inner"><a href="index.html" style="color:#cdd5e0">← गृहपृष्ठमा फर्कनुहोस्</a></div></div>
  <div class="auth-page">
    <div class="auth-card">
      <div class="auth-logo"><span class="logo-ne">नेपाल समाचार</span></div>
      <h2 class="auth-title">नयाँ खाता खोल्नुहोस् | Register</h2>
      <div class="error-msg" id="error-msg"></div>
      <div class="success-msg" id="success-msg">✅ सफलतापूर्वक दर्ता भयो! Redirecting...</div>
      <div class="form-group">
        <label>पूरा नाम | Full Name</label>
        <input type="text" id="reg-name" placeholder="राम बहादुर श्रेष्ठ" />
      </div>
      <div class="form-group">
        <label>इमेल | Email</label>
        <input type="email" id="reg-email" placeholder="your@email.com" />
      </div>
      <div class="form-group">
        <label>फोन नम्बर | Phone (Optional)</label>
        <input type="tel" id="reg-phone" placeholder="+977-98XXXXXXXX" />
      </div>
      <div class="form-group">
        <label>पासवर्ड | Password</label>
        <input type="password" id="reg-password" placeholder="कम्तीमा ८ अक्षर" />
      </div>
      <div class="form-group">
        <label>पासवर्ड दोहोर्याउनुहोस् | Confirm Password</label>
        <input type="password" id="reg-confirm" placeholder="••••••••" />
      </div>
      <button class="btn-auth" onclick="doRegister()">दर्ता गर्नुहोस् | Register</button>
      <p class="terms">दर्ता गरेर तपाईंले हाम्रो <a href="terms.html">सर्तहरू</a> र <a href="privacy.html">गोपनीयता नीति</a> स्वीकार गर्नुहुन्छ।</p>
      <div class="auth-switch">पहिले नै खाता छ? <a href="login.html">लगइन गर्नुहोस्</a></div>
    </div>
  </div>
  <script>
    function doRegister() {
      const name = document.getElementById('reg-name').value.trim();
      const email = document.getElementById('reg-email').value.trim();
      const phone = document.getElementById('reg-phone').value.trim();
      const pass = document.getElementById('reg-password').value;
      const conf = document.getElementById('reg-confirm').value;
      const err = document.getElementById('error-msg');
      const suc = document.getElementById('success-msg');
      err.style.display = 'none'; suc.style.display = 'none';
      if (!name || !email || !pass) { err.textContent = '❌ कृपया आवश्यक फिल्डहरू भर्नुहोस्।'; err.style.display = 'block'; return; }
      if (pass.length < 8) { err.textContent = '❌ पासवर्ड कम्तीमा ८ अक्षर हुनु पर्छ।'; err.style.display = 'block'; return; }
      if (pass !== conf) { err.textContent = '❌ पासवर्डहरू मिलेनन्।'; err.style.display = 'block'; return; }
      const users = JSON.parse(localStorage.getItem('users') || '[]');
      if (users.find(u => u.email === email)) { err.textContent = '❌ यो इमेल पहिले नै दर्ता छ।'; err.style.display = 'block'; return; }
      users.push({ name, email, phone, password: pass, isPremium: false, joinDate: new Date().toISOString() });
      localStorage.setItem('users', JSON.stringify(users));
      localStorage.setItem('currentUser', JSON.stringify({ name, email, isPremium: false }));
      suc.style.display = 'block';
      setTimeout(() => window.location.href = 'index.html', 1500);
    }
  </script>
</body>
</html>
